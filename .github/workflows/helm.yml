name: helm

on:
  push:
    branches: ["main"]
    tags:
      - "helm-v*"
    paths:
      - "charts/**"
  pull_request:
    branches: ["main"]
    paths:
      - "charts/**"

jobs:
  lint:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        helm-version: ["v3.21.3", "v4.2.3"]
    steps:
      - uses: actions/checkout@v7

      - name: Set up Helm ${{ matrix.helm-version }}
        uses: azure/setup-helm@v5
        with:
          version: ${{ matrix.helm-version }}

      - name: Helm lint
        run: helm lint ./charts/kopia_go_exporter

      - name: Helm template (dry-run)
        run: helm template kopia-go-exporter ./charts/kopia_go_exporter

  release:
    if: startsWith(github.ref_name, 'helm-v')
    needs: lint
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v7

      - name: Set up Helm
        uses: azure/setup-helm@v5

      - name: Check chart version matches tag
        run: |
          CHART_VERSION=$(grep '^version:' charts/kopia_go_exporter/Chart.yaml | awk '{print $2}' | tr -d '"' | tr -d "'")
          TAG_VERSION=${GITHUB_REF_NAME#helm-v}
          if [ "$CHART_VERSION" != "$TAG_VERSION" ]; then
            echo "ERROR: Chart.yaml version ($CHART_VERSION) does not match tag ($TAG_VERSION)"
            exit 1
          fi

      - name: Check appVersion matches version.txt
        run: |
          APP_VERSION=$(grep '^appVersion:' charts/kopia_go_exporter/Chart.yaml | awk '{print $2}' | tr -d '"' | tr -d "'")
          FILE_VERSION=$(cat version.txt | tr -d '[:space:]')
          if [ "$APP_VERSION" != "$FILE_VERSION" ]; then
            echo "ERROR: Chart.yaml appVersion ($APP_VERSION) does not match version.txt ($FILE_VERSION)"
            exit 1
          fi

      - name: Login to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | helm registry login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Package chart
        run: helm package ./charts/kopia_go_exporter

      - name: Push chart to GHCR
        run: helm push kopia_go_exporter-*.tgz oci://ghcr.io/${{ github.repository_owner }}/charts
