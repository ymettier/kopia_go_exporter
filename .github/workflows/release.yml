name: release

on:
  push:
    tags:
      - "v*.*.*"
      - "helm-v*"

permissions:
  contents: write
  packages: write

jobs:
  goreleaser:
    if: startsWith(github.ref_name, 'v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - run: git fetch --force --tags
      - uses: actions/setup-go@v6
        with:
          go-version: "1.26.5"

      - uses: goreleaser/goreleaser-action@v7
        with:
          distribution: goreleaser
          version: latest
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  helm-release:
    if: startsWith(github.ref_name, 'helm-v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Create draft release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION=${GITHUB_REF_NAME#helm-v}
          gh release create "$GITHUB_REF_NAME" \
            --repo "$GITHUB_REPOSITORY" \
            --title "kopia-go-exporter $VERSION" \
            --draft \
            --notes "**Helm chart version**: $VERSION

          **Install**:
          \`\`\`sh
          helm upgrade --install --rollback-on-failure kopia-go-exporter oci://ghcr.io/ymettier/charts/kopia-go-exporter --version $VERSION -f myvalues.yaml
          \`\`\`"
